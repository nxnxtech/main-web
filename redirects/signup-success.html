<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signup Successful</title>
  <link rel="icon" href="../images/simple-logo.png" type="image/png">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Inter, Arial, Helvetica, sans-serif;
    }

    body {
      background: #ffffff;
      color: #111111;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 520px;
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 12px;
      padding: 48px 36px;
      text-align: center;
    }

    .logo {
      width: 80px;
      height: auto;
      margin: 0 auto 24px;
      display: block;
    }

    .checkmark {
      width: 64px;
      height: 64px;
      margin: 0 auto 24px;
      border-radius: 50%;
      background: #000;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      font-weight: bold;
    }

    h1 {
      font-size: 30px;
      margin-bottom: 16px;
      color: #111;
    }

    p {
      font-size: 16px;
      color: #555;
      line-height: 1.6;
      margin-bottom: 16px;
    }

    .button {
      display: inline-block;
      margin-top: 24px;
      padding: 14px 32px;
      background: #000;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
    }

    .button:hover {
      opacity: 0.9;
    }

    .footer {
      margin-top: 40px;
      padding-top: 20px;
      border-top: 1px solid #eee;
      font-size: 13px;
      color: #888;
    }

    .footer a {
      color: #111;
      text-decoration: none;
      font-weight: 600;
    }

    @media (max-width: 600px) {
      .container {
        padding: 36px 24px;
      }

      h1 {
        font-size: 26px;
      }
    }
  </style>
</head>
<body>
  <div class="container">

    <img
      class="logo"
      src="https://nxnx.tech/images/logo.png"
      alt="NxNx Tech Logo"
    >

    <div class="checkmark">✓</div>

    <h1>Signup Successful</h1>

    <p>
      Your account has been created successfully and your email has been verified.
    </p>

    <p>
      You can now sign in on the page and start using the platform.
    </p>

    <div class="footer">
      Powered by
      <a href="https://nxnx.tech">NxNx Tech</a>
    </div>

  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Powered by NxNx Tech</title>
    <link rel="icon" href="../images/simple-logo.png" type="image/png">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 flex flex-col justify-center items-center min-h-screen p-4 font-sans">

    <div class="bg-white p-8 rounded-2xl shadow-md w-full max-w-md border border-gray-100">
        <!-- Header -->
        <div class="text-center mb-6">
            <h2 class="text-2xl font-bold text-gray-900">Set new password</h2>
            <p class="text-sm text-gray-500 mt-2">Please enter your new password below to secure your account.</p>
        </div>

        <!-- Form -->
        <form id="reset-form" action="#" method="POST" class="space-y-4">
            <!-- New Password -->
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">New Password</label>
                <div class="relative">
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        required 
                        placeholder="••••••••" 
                        class="w-full pl-4 pr-11 py-2.5 border border-gray-300 rounded-lg text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-black focus:border-black transition-colors"
                    >
                    <!-- Toggle Visibility Button -->
                    <button 
                        type="button"
                        id="toggle-password"
                        class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 focus:outline-none cursor-pointer"
                        aria-label="Toggle password visibility"
                    >
                        <!-- Eye Icon (Show) -->
                        <svg id="eye-icon-show" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                        <!-- Eye Off Icon (Hide) - Hidden by default -->
                        <svg id="eye-icon-hide" class="w-5 h-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a10.024 10.024 0 014.138-4.138M8.211 8.211a4.5 4.5 0 016.32 6.32m3.153 3.153L4.25 4.25M15.424 15.424A9.953 9.953 0 0019.542 12c-1.274-4.057-5.064-7-9.542-7-1.23 0-2.404.223-3.483.63m1.483 1.483l3.585 3.585" />
                        </svg>
                    </button>
                </div>
                
                <!-- Password Strength Container -->
                <div class="mt-2.5 space-y-1.5">
                    <div class="flex justify-between items-center text-xs">
                        <span class="text-gray-500">Password strength:</span>
                        <span id="strength-text" class="font-semibold text-gray-400">Empty</span>
                    </div>
                    <!-- Strength Bar -->
                    <div class="h-1.5 w-full bg-gray-100 rounded-full overflow-hidden flex gap-0.5">
                        <div id="bar-1" class="h-full w-1/4 bg-gray-200 transition-all duration-300"></div>
                        <div id="bar-2" class="h-full w-1/4 bg-gray-200 transition-all duration-300"></div>
                        <div id="bar-3" class="h-full w-1/4 bg-gray-200 transition-all duration-300"></div>
                        <div id="bar-4" class="h-full w-1/4 bg-gray-200 transition-all duration-300"></div>
                    </div>
                </div>
            </div>

            <!-- Confirm Password -->
            <div>
                <label for="confirm-password" class="block text-sm font-medium text-gray-700 mb-1">Confirm New Password</label>
                <div class="relative">
                    <input 
                        type="password" 
                        id="confirm-password" 
                        name="confirm-password" 
                        required 
                        placeholder="••••••••" 
                        class="w-full pl-4 pr-11 py-2.5 border border-gray-300 rounded-lg text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-black focus:border-black transition-colors"
                    >
                    <!-- Toggle Visibility Button -->
                    <button 
                        type="button"
                        id="toggle-confirm-password"
                        class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 focus:outline-none cursor-pointer"
                        aria-label="Toggle password visibility"
                    >
                        <!-- Eye Icon (Show) -->
                        <svg id="confirm-eye-icon-show" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                        <!-- Eye Off Icon (Hide) - Hidden by default -->
                        <svg id="confirm-eye-icon-hide" class="w-5 h-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a10.024 10.024 0 014.138-4.138M8.211 8.211a4.5 4.5 0 016.32 6.32m3.153 3.153L4.25 4.25M15.424 15.424A9.953 9.953 0 0019.542 12c-1.274-4.057-5.064-7-9.542-7-1.23 0-2.404.223-3.483.63m1.483 1.483l3.585 3.585" />
                        </svg>
                    </button>
                </div>
                <p id="match-error" class="hidden text-xs text-red-500 mt-1.5">Passwords do not match.</p>
            </div>

            <!-- Submit Button -->
            <button 
                type="submit" 
                id="submit-btn"
                class="w-full bg-black hover:bg-neutral-900 text-white font-medium py-2.5 px-4 rounded-lg transition-colors cursor-pointer mt-2 disabled:opacity-50 disabled:cursor-not-allowed"
            >
                Update Password
            </button>
        </form>
    </div>

    <!-- Branding Footer -->
    <div class="mt-6 text-center">
        <p class="text-xs text-gray-400 tracking-wide uppercase">
            Powered by <span class="font-semibold text-gray-600">NxNx Tech</span>
        </p>
    </div>

    <!-- Live Interactivity Script -->
    <script>
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirm-password');
        const strengthText = document.getElementById('strength-text');
        const matchError = document.getElementById('match-error');
        const submitBtn = document.getElementById('submit-btn');

        // Toggle elements
        const togglePasswordBtn = document.getElementById('toggle-password');
        const eyeIconShow = document.getElementById('eye-icon-show');
        const eyeIconHide = document.getElementById('eye-icon-hide');

        const toggleConfirmPasswordBtn = document.getElementById('toggle-confirm-password');
        const confirmEyeIconShow = document.getElementById('confirm-eye-icon-show');
        const confirmEyeIconHide = document.getElementById('confirm-eye-icon-hide');

        const bars = [
            document.getElementById('bar-1'),
            document.getElementById('bar-2'),
            document.getElementById('bar-3'),
            document.getElementById('bar-4')
        ];

        // 1. Password Visibility Toggle Logic
        togglePasswordBtn.addEventListener('click', () => {
            const isPassword = passwordInput.type === 'password';
            passwordInput.type = isPassword ? 'text' : 'password';
            eyeIconShow.classList.toggle('hidden', isPassword);
            eyeIconHide.classList.toggle('hidden', !isPassword);
        });

        toggleConfirmPasswordBtn.addEventListener('click', () => {
            const isPassword = confirmPasswordInput.type === 'password';
            confirmPasswordInput.type = isPassword ? 'text' : 'password';
            confirmEyeIconShow.classList.toggle('hidden', isPassword);
            confirmEyeIconHide.classList.toggle('hidden', !isPassword);
        });

        // 2. Strength Checker & Validation Logic
        function checkStrength(password) {
            let score = 0;
            if (!password) return 0;

            if (password.length >= 8) score++;
            if (/\d/.test(password)) score++;
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) score++;
            if (/[^A-Za-z0-9]/.test(password)) score++;

            return score;
        }

        function updateUI() {
            const password = passwordInput.value;
            const confirmPassword = confirmPasswordInput.value;
            const score = checkStrength(password);

            bars.forEach(bar => {
                bar.className = "h-full w-1/4 bg-gray-200 transition-all duration-300";
            });

            const states = [
                { text: 'Too Weak', color: 'bg-red-500' },
                { text: 'Weak', color: 'bg-orange-500' },
                { text: 'Medium', color: 'bg-yellow-500' },
                { text: 'Strong', color: 'bg-emerald-500' }
            ];

            if (score > 0) {
                const currentState = states[score - 1];
                strengthText.textContent = currentState.text;
                strengthText.className = `font-semibold ${currentState.color.replace('bg-', 'text-')}`;
                
                for (let i = 0; i < score; i++) {
                    bars[i].className = `h-full w-1/4 ${currentState.color} transition-all duration-300`;
                }
            } else {
                strengthText.textContent = 'Empty';
                strengthText.className = 'font-semibold text-gray-400';
            }

            let passwordsMatch = true;
            if (password && confirmPassword) {
                if (password !== confirmPassword) {
                    matchError.classList.remove('hidden');
                    passwordsMatch = false;
                } else {
                    matchError.classList.add('hidden');
                }
            } else {
                matchError.classList.add('hidden');
            }

            const isPasswordValid = score >= 3;
            if (isPasswordValid && password === confirmPassword) {
                submitBtn.removeAttribute('disabled');
            } else {
                submitBtn.setAttribute('disabled', 'true');
            }
        }

        passwordInput.addEventListener('input', updateUI);
        confirmPasswordInput.addEventListener('input', updateUI);
        
        updateUI();
    </script>
</body>
</html>

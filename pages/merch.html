<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Merch — NxNx Tech</title>
<meta name="description" content="Shirts, caps and more from NxNx Tech.">
<link rel="stylesheet" href="../css/styles.css">
<link rel="icon" href="../images/simple-logo.png" type="image/png">
</head>
<body data-page-name="Merch">

<div data-component="header"></div>

<!-- FREE DELIVERY BANNER -->
<div style="background:var(--ink); color:var(--paper);">
  <div class="wrap merch-banner" style="margin-top: 0px; margin-bottom: -40px;">
    <span style="font-family:var(--font-mono); font-size:0.82rem; letter-spacing:0.01em; align-items:end;">
      🚚 Spend <strong data-free-delivery-threshold style="color:var(--marigold);">GH₵—</strong>+ and get <strong>FREE delivery</strong> in eligible areas.
    </span>
    <a href="delivery-info.html" style="font-family:var(--font-mono); font-size:0.78rem; text-transform:uppercase; letter-spacing:0.05em; color:var(--paper); border:1.5px solid var(--paper); border-radius:999px; padding:5px 12px; text-decoration:none; opacity:0.9; white-space:nowrap;">ⓘ See locations</a>
  </div>
</div>

<!-- HEADER -->
<section style="padding-top:70px; padding-bottom:40px;">
  <div class="wrap merch-card-section">
    <span class="route-tag">Merch</span>
    <h1 style="margin-top:20px;">Wear the talent.</h1>
    <p class="lede" style="margin-top:20px;">Shirts, caps and a few other things carrying the NxNx signal-lime. Limited runs — once it's gone, it's gone.</p>
  </div>
</section>

<div class="wrap"><div class="road-rule"></div></div>

<!-- MERCH GRID -->
<section class="reveal">
  <div class="wrap">
    <div id="merch-grid" class="merch-grid">
      <!-- Products loaded from Supabase -->
    </div>
  </div>
</section>

<div data-component="business-card"></div>
<div data-component="product-modal"></div>
<div data-component="checkout-modal"></div>

<div data-component="footer"></div>

<script src="../js/cookies.js"></script>
<script src="../js/cart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-config.js"></script>
<script src="../js/free-delivery-banner.js"></script>
<script src="https://js.paystack.co/v2/inline.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="../components/header.js"></script>
<script src="../components/footer.js"></script>
<script src="../components/business-card.js"></script>
<script src="../components/product-modal.js"></script>
<script src="../components/checkout-modal.js"></script>
<script src="../components/cart-bag.js"></script>
<script src="../components/profile-menu.js"></script>
<script src="../components/loading.js"></script>
<script src="../js/components.js"></script>
<script src="../js/main.js"></script>
<script src="../js/merch.js"></script>
</body>
</html>
